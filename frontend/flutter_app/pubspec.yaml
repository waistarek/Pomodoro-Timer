name: pomodoro_app
description: Professionelle Pomodoro-App mit Flutter, FastAPI und Offline-Grundfunktion.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  audioplayers: ^6.1.0
  fl_chart: ^0.69.2
  intl: any
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/audios/bells.mp3
