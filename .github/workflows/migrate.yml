name: Run database migrations

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "backend/app/models.py"
      - "backend/app/schemas.py"
      - "backend/alembic/**"
      - "backend/alembic.ini"
      - "backend/requirements.txt"
      - ".github/workflows/migrate.yml"

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: python, pip, PATH, alembic
        run: |
          python --version
          python -m pip --version
          python -m pip show alembic || echo "alembic not installed"
          which alembic || echo "alembic not in PATH"
          python -m site
          echo "PATH=$PATH"
          
      - name: Show current migration
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL_DIRECT }}
        run: alembic current

      - name: Preview pending migrations (SQL only)
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL_DIRECT }}
        run: alembic upgrade --sql head > migration_preview.sql

      - name: Basic safety scan of preview
        run: |
          # fail if preview contains destructive statements we didn't expect
          if grep -Eiq "DROP TABLE|TRUNCATE|DROP COLUMN" migration_preview.sql; then
            echo "Dangerous statements found in migration_preview.sql"; exit 1
          fi
          echo "Preview looks OK"

      - name: Print SQL preview (for logs)
        run: cat migration_preview.sql

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL_DIRECT }}
        run: alembic upgrade head
